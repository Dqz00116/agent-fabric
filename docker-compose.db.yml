version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: agent-fabric-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_fabric
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent-fabric-network

  # 可选：PgAdmin 用于开发调试
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: agent-fabric-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - agent-fabric-network

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  agent-fabric-network:
    driver: bridge
